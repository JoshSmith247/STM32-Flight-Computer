[target.thumbv7em-none-eabihf]
# NUCLEO-H723ZG: flash + run over the onboard ST-LINK via probe-rs, which also
# streams defmt/RTT logs to the terminal (`cargo run`).
# Requires: cargo install probe-rs-tools
runner = "probe-rs run --chip STM32H723ZGTx"

rustflags = [
  "-C", "link-arg=-Tlink.x",
  "-C", "link-arg=-Tdefmt.x",
  "-C", "link-arg=-zstack-size=0x2000",
]

[build]
target = "thumbv7em-none-eabihf"

[env]
# defmt compile-time log filter. "info" surfaces the per-task init banners
# (Motors:, Telemetry:, …) alongside warn/error during bring-up. Bump to
# "trace" when chasing something; drop to "warn"/"error" to quiet the link.
DEFMT_LOG = "info"